{% extends 'base.html' %}
{% block title %}Create Account — EventFlow{% endblock %}
{% block extra_css %}
<style>
    body::before {
        content: '';
        position: fixed; inset: 0; z-index: -1;
        background:
            radial-gradient(ellipse 80% 60% at 80% -10%, rgba(201,168,76,0.07) 0%, transparent 60%),
            radial-gradient(ellipse 60% 50% at 20% 110%, rgba(124,111,205,0.06) 0%, transparent 60%);
    }
    main { display: flex; align-items: center; justify-content: center; padding: 2rem; min-height: calc(100vh - 64px); }
    .auth-card {
        width: 100%; max-width: 460px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 2.5rem;
        animation: fadeUp 0.4s ease;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    .auth-logo { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 600; color: var(--gold); margin-bottom: 0.25rem; }
    .auth-subtitle { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 2.5rem; }
    .auth-footer { margin-top: 1.5rem; text-align: center; font-size: 0.85rem; color: var(--text-muted); }
    .auth-footer a { color: var(--gold); text-decoration: none; }
</style>
{% endblock %}

{% block content %}
<main>
    <div class="auth-card">
        <div class="auth-logo">EventFlow</div>
        <div class="auth-subtitle">Create your account to discover and book events</div>

        <form method="post">
            {% csrf_token %}
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">First Name</label>
                    <input type="text" name="first_name" class="form-control" placeholder="John" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Last Name</label>
                    <input type="text" name="last_name" class="form-control" placeholder="Doe" required>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="johndoe" required>
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" placeholder="john@example.com" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" name="password2" class="form-control" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-lg" style="width:100%; justify-content:center; margin-top:0.5rem;">
                Create Account
            </button>
        </form>

        <div class="auth-footer" style="margin-top:1.5rem;">
            Already have an account? <a href="{% url 'login' %}">Sign in</a>
        </div>
    </div>
</main>
{% endblock %}
